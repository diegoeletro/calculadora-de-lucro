<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Lucro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3a0ca3">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(160deg, #1e1e2f, #3a0ca3);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .app {
      background: white;
      padding: 25px;
      border-radius: 25px;
      width: 320px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ddd;
      text-align: center;
      font-size: 16px;
    }

    .resultado {
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      background: #f5f6ff;
    }

    .valor { font-size: 32px; font-weight: bold; }
    .percentual { font-size: 20px; font-weight: bold; }

    .descricao {
      font-size: 14px;
      margin-top: 5px;
      color: #666;
    }

    .verde { color: #2ecc71; }
    .vermelho { color: #e74c3c; }

    .btn, .btn-pix {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      border: none;
      color: white;
    }

    .btn { background: #3a0ca3; }
    .btn-pix { background: #2ecc71; }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      line-height: 1.5;
      color: #666;
    }
  </style>
</head>
<body>

<div class="app">
  <h2>💰 Calculadora de Lucro</h2>

  <label>Preço de custo</label>
  <input type="text" id="custo" inputmode="decimal" placeholder="R$ 0">

  <label>Valor do repasse</label>
  <input type="text" id="venda" inputmode="decimal" placeholder="R$ 0">

  <div class="resultado">
    <div id="valor" class="valor verde">R$ 0,00</div>
    <div id="percentual" class="percentual verde">0%</div>
    <div id="descricao" class="descricao">Resultado por venda</div>
  </div>

  <button class="btn">📱 Instalar App</button>
  <button class="btn-pix" onclick="copiarPix()">💸 Copiar PIX</button>

  <div class="footer">
    Desenvolvido por DIEGO ELETRO LTDA 2026<br>
    Contato: dsf.empresa@gmail.com<br>
    Doação: Chave PIX (CNPJ): 17816268000107
  </div>
</div>

<script>
const custoInput = document.getElementById("custo");
const vendaInput = document.getElementById("venda");
const valorEl = document.getElementById("valor");
const percentualEl = document.getElementById("percentual");
const descricaoEl = document.getElementById("descricao");

function formatar(valor) {
  valor = valor.replace(/[^\d,]/g, "");

  if (valor.includes(",")) {
    let partes = valor.split(",");
    partes[1] = partes[1].slice(0, 2);
    valor = partes[0] + "," + partes[1];
  }

  return "R$ " + valor;
}

function limpar(valor) {
  return parseFloat(
    valor.replace("R$", "")
         .replace(",", ".")
  ) || 0;
}

function aoDigitar(e) {
  let valor = e.target.value.replace("R$ ", "");
  e.target.value = formatar(valor);
  calcular();
}

custoInput.addEventListener("input", aoDigitar);
vendaInput.addEventListener("input", aoDigitar);

function calcular() {
  const custo = limpar(custoInput.value);
  const venda = limpar(vendaInput.value);

  if (custo <= 0 || venda <= 0) {
    valorEl.innerText = "R$ 0,00";
    percentualEl.innerText = "0%";
    descricaoEl.innerText = "Resultado por venda";
    return;
  }

  const lucro = venda - custo;
  const percentual = (lucro / custo) * 100;

  valorEl.innerText = "R$ " + lucro.toFixed(2).replace(".", ",");
  percentualEl.innerText = Math.round(percentual) + "%";

  if (lucro >= 0) {
    valorEl.className = "valor verde";
    percentualEl.className = "percentual verde";
    descricaoEl.innerText = "Lucro por venda";
  } else {
    valorEl.className = "valor vermelho";
    percentualEl.className = "percentual vermelho";
    descricaoEl.innerText = "Prejuízo por venda";
  }
}

function copiarPix() {
  navigator.clipboard.writeText("17816268000107");
  alert("PIX copiado!");
}
</script>

</body>
</html>
